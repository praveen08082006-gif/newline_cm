{% extends 'core/base.html' %}
{% block title %}Add FAQ | Newline CMS{% endblock %}
{% block breadcrumb %}<li class="breadcrumb-item">FAQ</li><li class="breadcrumb-item active">Add</li>{% endblock %}

{% block content %}
<a href="{% url 'faq_list' %}" class="btn btn-primary mb-3"><i class="fas fa-arrow-left mr-1"></i>Back</a>
<div class="card">
  <div class="card-header"><span class="card-title">Add FAQ</span></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Question <span class="text-required">*</span></label>
        {{ form.question }}
      </div>
      <div class="form-group">
        <label>Answer <span class="text-required">*</span></label>
        {{ form.answer }}
      </div>
      <div class="text-right"><button type="submit" class="btn btn-primary px-4">Submit</button></div>
    </form>
  </div>
</div>
{% endblock %}
