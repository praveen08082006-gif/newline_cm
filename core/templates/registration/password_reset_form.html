{% load static %}
<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password | Newline</title>
<link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2.0/dist/css/adminlte.min.css">
<link rel="stylesheet" href="{% static 'css/royale.css' %}">
</head>
<body style="margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(125deg,#0a1330,#11224f,#0c1a3e,#15356b);font-family:'Inter',sans-serif;">
  <div class="royale-login" style="width:420px;max-width:92vw;">
    <div class="card"><div class="card-body login-card-body">
      <h5 class="login-title">Reset password</h5>
      <p class="login-box-msg">Enter your registered email and we'll send you a reset link.</p>
      <form method="post">{% csrf_token %}
        <div class="input-group mb-3">
          <input type="email" name="email" class="form-control" placeholder="Email address" required autofocus>
          <div class="input-group-append"><div class="input-group-text"><span class="fas fa-envelope"></span></div></div>
        </div>
        <button type="submit" class="btn btn-block btn-signin text-white">Send reset link</button>
      </form>
      <p class="text-center mt-3 mb-0"><a href="{% url 'login' %}">Back to login</a></p>
    </div></div>
  </div>
</body></html>
