{% load static %}
<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Check your email | Newline</title>
<link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2.0/dist/css/adminlte.min.css">
<link rel="stylesheet" href="{% static 'css/royale.css' %}">
</head>
<body style="margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(125deg,#0a1330,#11224f,#0c1a3e,#15356b);font-family:'Inter',sans-serif;">
  <div class="royale-login" style="width:440px;max-width:92vw;">
    <div class="card"><div class="card-body login-card-body text-center">
      <i class="fas fa-paper-plane" style="font-size:42px;color:#1E4FA3;"></i>
      <h5 class="login-title mt-3">Check your email</h5>
      <p class="login-box-msg">If an account exists for that email, we've sent a link to reset your password. Please check your inbox (and spam).</p>
      <a href="{% url 'login' %}" class="btn btn-block btn-signin text-white">Back to login</a>
    </div></div>
  </div>
</body></html>
